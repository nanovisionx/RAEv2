stage_1:
  target: stage1.RAE
  params:
    encoder_name: dinov3mls-vit-l16[layers=11.13.15.17.19.21.23]
    resolution: 256
    decoder_config_path: configs/decoder/ViTXL
    pretrained_decoder_path: pretrained_models/stage1/imagenet/dinov3l-k7/decoder.pt
    normalization_stat_path: pretrained_models/stage1/imagenet/dinov3l-k7/stats.pt
    noise_tau: 0.0

# Used only by offline_eval_stage1.py; sample.py ignores everything below.
training:
  global_batch_size: 256
  num_workers: 1
  image_size: 256

eval:
  eval_dir: results/stage1/eval
  datasets:
    imagenet:
      type: hf
      data_dir: ./data/imagenet-256
      split: val
      condition_type: label
      reference_npz: data/imagenet-256/imagenet-256-val.npz
      metrics: [psnr, ssim, lpips, rfid]
